{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свадьба Руслана и Даны</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'invite/css/style.css' %}">
</head>
<body>
    {% block content %}{% endblock %}
    
    <button id="musicToggle" class="music-btn glass">
        <svg fill="#2C3E35" width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <audio id="bgMusic" loop>
        <!-- Убедитесь, что добавили mp3 файл в static/invite/audio/ -->
        <source src="{% static 'invite/audio/music.mp3' %}" type="audio/mpeg">
    </audio>

    <script src="{% static 'invite/js/main.js' %}"></script>
</body>
</html>
