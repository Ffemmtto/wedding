{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Базовые теги -->
    <title>Свадьба Руслана и Даны | 27.04.2026</title>
    <meta name="description" content="Приглашаем вас разделить с нами этот особенный день.">

    <!-- Open Graph (WhatsApp, Telegram, Facebook, VK) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
    <meta property="og:title" content="Свадьба Руслана и Даны 🤍">
    <meta property="og:description" content="Приглашаем вас разделить с нами этот особенный день! 27 апреля 2026 года.">
    <!-- Ссылка на картинку обязательно должна быть абсолютной -->
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'invite/img/og_banner.png' %}">

    <!-- Twitter / X Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Свадьба Руслана и Даны 🤍">
    <meta name="twitter:description" content="Приглашаем вас разделить с нами этот особенный день! 27 апреля 2026 года.">
    <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'invite/img/og_banner.png' %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'invite/css/style.css' %}">
</head>
<body>
    {% block content %}{% endblock %}
    
    <button id="musicToggle" class="music-btn glass">
        <svg fill="#2C3E35" width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <audio id="bgMusic" loop>
        <!-- Убедитесь, что добавили mp3 файл в static/invite/audio/ -->
        <source src="{% static 'invite/audio/music.mp3' %}" type="audio/mpeg">
    </audio>

    <script src="{% static 'invite/js/main.js' %}"></script>
</body>
</html>
