{% extends 'invite/base.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <!-- Золотая пыльца на фоне -->
    <img src="{% static 'invite/img/gold_dust.png' %}" class="decor gold-dust" alt="">
    
    <div class="form-card glass login-card fade-in visible" style="text-align: center; padding: 50px 30px; position: relative; z-index: 2;">
        <h2 class="section-title">До свидания!</h2>
        <p style="margin-bottom: 30px;">Вы успешно вышли из панели организатора.</p>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <a href="{% url 'login' %}" class="btn">Войти снова</a>
            <a href="{% url 'index' %}" class="btn-outline">На главную страницу</a>
        </div>
    </div>
</div>
{% endblock %}
